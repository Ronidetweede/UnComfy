<!doctype html>
<html lang="nl-BE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Un(comfy) - Subscription</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/subscription.css" />
  </head>
  <body>
    <header>
      <h1>un<br />(comfy)</h1>
      <img src="./assets/comfort-animals/sad-frog-green.png" alt="sad-frog" />
    </header>
    <main>
      <p class="support-text">Please support to unlock more features</p>
      <section class="subscription-options">
        <div class="sub-popular">
          <span>most popular</span>
          <div>
            <h2>12 months</h2>
            <p>$ 3,99/months</p>    
            <p class="pricing">
              <del>$ 95,96</del>
              <span class="new-price">$ 47.99</span>
            </p>
          </div>
        </div>
        <div>
          <h2>3 months</h2>
          <p>$ 8,00/months</p>
          <p class="pricing">$ 23,99</p>
        </div>
      </section>
      <a href="#">no thanks</a>
      <section class="reviews">
        <!-- Hier reviews laden met javascript/typescript -->
      </section>
    </main>
    <footer>
        <h2>Contact & Support</h2>
        <p>Need help or have questions? Tap the "<span class="contact-support-link">email people</span>" button in the app or reach out to supprt@uncomfy.app.</p>
    </footer>
  </body>
</html>
