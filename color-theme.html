<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thema</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/color-theme.css">
    <link rel="stylesheet" href="css/desktop-layout.css">
    <script type="module" src="js/color-theme.js"></script>
</head>
<body>
    <header>
        <div class="header">
            <a href="profile-page.html">
                <img src="assets/icons/left-arrow.png" alt="Pijl">
            </a>
            <h1>Thema</h1>
            <p>Kies het kleurenthema van jouw app!</p>
        </div>
    </header>

    <main>
        <div class="preview">
            <p class="example">Voorbeeld</p>

            <div class="profile">
                <div class="picture"></div>
                <h2 class="name">Helena Hills</h2>
            </div>

            <div class="points-card">
                <p>Jouw ComfyPunten</p>
                <h1>1,230</h1>
            </div>

            <div class="tabs">
                <div class="tab active">Tijdlijn</div>
                <div class="tab">Galerij</div>
            </div>
        </div>

        <div class="colors">
            <div class="info">
                <h3>Kies een thema</h3>
                <p>De groene accenten in de app worden vervangen door jouw gekozen kleur.</p>
            </div>

            <div class="options">
                <button id="green" class="theme-option selected">
                    <span class="color-circle green"></span>
                    <span>Groen</span>
                    <span class="checkmark">✓</span>
                </button>

                <button id="blue" class="theme-option">
                    <span class="color-circle blue"></span>
                    <span>Blauw</span>
                    <span class="checkmark">✓</span>
                </button>

                <button id="pink" class="theme-option">
                    <span class="color-circle pink"></span>
                    <span>Roze</span>
                    <span class="checkmark">✓</span>
                </button>

                <button id="yellow" class="theme-option">
                    <span class="color-circle yellow"></span>
                    <span>Geel</span>
                    <span class="checkmark">✓</span>
                </button>
            </div>
        </div>

        <button class="save-button">Thema opslaan</button>
    </main>
    <footer>
        <div class="menu-icons">
            <a href="menu.html"><img src="assets/icons/home.png" alt="Huis-icoon"></a>
            <a href="dailychallenges.html"><img src="assets/icons/discover.png" alt="Ontdek-icoon"></a>
            <a href="rewards.html"><img src="assets/icons/rewards.png" alt="Beloning-icoon"></a>
            <a href="profile-page.html"><img src="assets/icons/green-person.png" alt="Persoon-icoon"></a>
        </div>
    </footer>
</body>
</html>
