<!doctype html>
<html lang="nl-BE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Un(comfy) - Profiel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <!-- <link rel="stylesheet" href="./css/desktop-layout.css"> -->
    <link rel="stylesheet" href="./css/accountsetup.css" />
  </head>
  <body>
    <img src="./assets/Logo/Logo.png" class="logoDesktop">
    <header>
      <a href="./profile-page.html" class="arrow"><</a>
      <h2 class="text-edit-profile">Bewerk Profiel</h2>
    </header>
    <main>
      <section class="profile-picture">
        <div class="profile-circle">
          <img
            src="./assets/placeholders/helena.png"
            alt="profile-picture"
            class="profile"
          />
          <button>
            <img src="./assets/icons/camera-button.png" alt="camera-button" />
          </button>
        </div>

        <h2>Helena Hills</h2>
        <p>Tik op de camera om de foto te wijzigen</p>
      </section>

      <section class="personal-info">
        <h2>Persoonlijke gegevens</h2>

        <form>
          <div class="input-container">
            <label for="name">
              <img src="./assets/icons/green-profile.png" alt="green-person" />
              <p>Naam</p>
            </label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Helena Hills"
              required
            />
          </div>

          <div class="input-container">
            <label for="username">
              <img src="./assets/icons/green-at.png" alt="green-at" />
              <p>Gebruikersnaam</p>
            </label>
            <input
              type="text"
              name="username"
              id="username"
              placeholder="helenahills"
              required
            />
          </div>

          <div class="input-container">
            <label for="email">
              <img src="./assets/icons/green-email.png" alt="green-email" />
              <p>Email</p>
            </label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="helena.hills@mail.com"
              required
            />
          </div>
        </form>
      </section>

      <section class="account-settings">
        <h2>Account Instellingen</h2>

        <form>
          <div class="input-container">
            <label for="password">Wachtwoord</label>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="******"
            />
          </div>
          <div class="input-container">
            <label for="confirm-password">Bevestig Wachtwoord</label>
            <input
              type="password"
              name="confirm-password"
              id="confirm-password"
              placeholder="******"
            />
          </div>
          <div class="input-container">
            <label for="notifications">Meldingen</label>
            <select name="notifications" id="notifications">
              <option value="">-- Select --</option>
              <option value="enabled">Aan</option>
              <option value="disabled">Uit</option>
            </select>
          </div>
        </form>
      </section>

      <button class="save-button">
        <img
          src="./assets/icons/save-changes-icon.png"
          alt="save-changes-icon"
        />
        <p>Wijzigingen opslaan</p>
      </button>
    </main>
    <footer>
        <div class="menu-icons">
            <a href="menu.html"><img src="assets/icons/home.png" alt="Huis-icoon"><p>Thuis</p></a>
            <a href="dailychallenges.html"><img src="assets/icons/discover.png" alt="Ontdek-icoon"><p>Verken</p></a>
            <a href="rewards.html"><img src="assets/icons/rewards.png" alt="Beloning-icoon"><p>Rewards</p></a>
            <a href="profile-page.html"><img src="assets/icons/person.png" alt="Persoon-icoon" class="black-icon"><img src="assets/icons/white-person.png" alt="white-person-icon" class="white-icon"><p>Profiel</p></a>
        </div>
    </footer>
  </body>
</html>
