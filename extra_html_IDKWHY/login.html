<!doctype html>
<html lang="nl-BE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Un(comfy) - Inloggen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/login.css" />
  </head>
  <body>
    <div class="container">

      <header>
        <div class="title">
          <h1>un<br>(comfy)</h1>
        </div>
      </header>
      <main>
  
        <div class="form-div">
          <section>
            <h2>Maak een account aan</h2>
            <p>Vul je e-mailadres in om je aan te melden voor deze app</p>
          </section>
    
          <form>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="email@domain.com"
              required
              class="input-field"
            />
            <button type="submit" class="continue-button">Doorgaan</button>
          </form>
    
          <p>or</p>
    
          <section class="social-login">
            <div class="social-login-button">
              <img src="./assets/icons/icon-google.png" alt="google-icon" />
              <p>Doorgaan met Google</p>
            </div>
            <div class="social-login-button">
              <img src="./assets/icons/icon-apple.png" alt="apple-icon" />
              <p>Doorgaan met Apple</p>
            </div>
          </section>
    
          <section class="terms">
            <p>
              Door op ‘Doorgaan’ te klikken, gaat u akkoord met onze
              <a href="terms-of-service.html">Gebruiksvoorwaarden</a> and <a href="privacy-policy.html">Privacybeleid</a> 
              <!-- gelinkt naar bestaande pagina's -->
            </p>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
