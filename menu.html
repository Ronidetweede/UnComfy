<!doctype html>
<html lang="nl-BE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Un(comfy) - Menu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/menu.css" />
  </head>
  <body>
    <header>
      <h1>un<br />(comfy)</h1>
    </header>
    <main>
      <section class="todays-challenge">
        <h2>Todays challenge</h2>
        <div>
          <p>Go out for dinner solo</p>
        </div>
      </section>

      <section class="streak-container">
        <div class="streak-header">
          <div>
            <h2>Weekly Streak</h2>
            <p>5 out of 7 days completed</p>
          </div>

          <div class="streak-icon">
            <img src="./assets/icons/streak-icon.png" alt="streak-icon" />
          </div>
        </div>

        <div class="days">
          <div class="day completed">M</div>
          <div class="day completed">T</div>
          <div class="day completed">W</div>
          <div class="day completed">T</div>
          <div class="day completed">F</div>
          <div class="day active">S</div>
          <div class="day disabled">S</div>
        </div>

        <div class="bonus">
          <span>Complete week for bonus</span>
          <span>+100 CP</span>
        </div>
      </section>
      <section class="leaderbord"></section>
      <section class="explore-challenges"></section>
    </main>
    <footer></footer>
  </body>
</html>
