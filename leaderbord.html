<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderbord</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/leaderbord.css">
    <script type="module" src="js/leaderbord.js"></script>
</head>
<body>
    <header>
        <div class="header">
            <a href="menu.html">
                <img src="assets/icons/left-arrow.png" alt="Pijl">
            </a>
            <div class="tabs">
                <button id="week-button" class="week-button active">Week</button>
                <button id="month-button" class="month-button">Maand</button>
            </div>
            <div class="top3">
                <div class="person second">
                    <img class="secondplace" src="assets/icons/secondplace.png" alt="Second">
                    <img class="profile" src="assets/placeholders/jeffrey.png" alt="Jeffrey">
                    <p>Jeffrey</p>
                    <span>1130</span>
                </div>

                <div class="person first">
                    <img class="crown" src="assets/icons/crown.png" alt="Crown">
                    <img class="profile" src="assets/placeholders/helena.png" alt="Helena">
                    <p>Helena</p>
                    <span>1230</span>
                </div>

                <div class="person third">
                    <img class="thirdplace" src="assets/icons/thirdplace.png" alt="ThirdPlace">
                    <img class="profile" src="assets/placeholders/anna.png" alt="Anna">
                    <p>Anna</p>
                    <span>1000</span>
                </div>
            </div>
            <div class="ranklist">
                <div class="item">
                    <span>4</span>
                    <img src="assets/placeholders/alex.png" alt="Alex">
                    <p>Alex Johnson</p>
                    <b>900</b>
                </div>

                <div class="item">
                    <span>5</span>
                    <img src="assets/placeholders/sarah.png" alt="Sarah">
                    <p>Sarah Mitchell</p>
                    <b>840</b>
                </div>

                <div class="item">
                    <span>6</span>
                    <img src="assets/placeholders/marcus.png" alt="Marcus">
                    <p>Marcus Chen</p>
                    <b>800</b>
                </div>

                <div class="item">
                    <span>7</span>
                    <img src="assets/placeholders/emma.png" alt="Emma">
                    <p>Emma Davis</p>
                    <b>740</b>
                </div>
            </div>
        </div>
    </header>
    <main></main>
    <footer>
        <div class="menu-icons">
            <a href="menu.html"><img src="assets/icons/home.png" alt="Huis-icoon"></a>
            <a href="dailychallenges.html"><img src="assets/icons/discover.png" alt="Ontdek-icoon"></a>
            <a href="rewards.html"><img src="assets/icons/rewards.png" alt="Beloning-icoon"></a>
            <a href="profile-page.html"><img src="assets/icons/green-person.png" alt="Persoon-icoon"></a>
        </div>
    </footer>
</body>
</html>
